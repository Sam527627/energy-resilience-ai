name: EnergyShield AI — CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run tests
      env:
        DEMO_MODE: "true"
      run: |
        python -m pytest tests/ -v

    - name: Verify app imports
      run: |
        python -c "from config.settings import CORRIDORS, INDIA_REFINERIES; print('Config OK')"
        python -c "from utils.commodity_feed import get_live_prices; p = get_live_prices(); print(f'Commodity feed OK: Brent ${p[\"brent_crude\"][\"price\"]}')"
        python -c "from utils.news_fetcher import fetch_geopolitical_news; h = fetch_geopolitical_news(3); print(f'News feed OK: {len(h)} headlines')"
        python -c "from agents.ais_tracker import get_live_vessels; v = get_live_vessels(); print(f'AIS OK: {len(v)} vessels tracked')"
