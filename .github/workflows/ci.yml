name: EnergyShield AI — CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run all 12 tests
      env:
        DEMO_MODE: "true"
      run: python -m pytest tests/ -v

    - name: Verify config
      run: python -c "from config.settings import CORRIDORS; print('Config OK -', len(CORRIDORS), 'corridors')"

    - name: Verify commodity feed
      run: python -c "from utils.commodity_feed import get_live_prices; p = get_live_prices(); print('Commodity OK')"

    - name: Verify news feed
      run: python -c "from utils.news_fetcher import fetch_geopolitical_news; h = fetch_geopolitical_news(3); print('News OK -', len(h), 'headlines')"

    - name: Verify AIS tracker
      run: python -c "from agents.ais_tracker import get_live_vessels; v = get_live_vessels(); print('AIS OK -', len(v), 'vessels')"

    - name: Verify vessel intel
      run: python -c "from agents.vessel_intel import lookup_vessel; v = lookup_vessel('9839131'); print('Vessel OK -', v['name'])"
